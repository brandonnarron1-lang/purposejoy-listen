<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Default meta (overridden per-route by Pages Functions OG injection) -->
    <title>PurposeJoy Listen</title>
    <meta name="description" content="Stream gospel and faith music — Live With Purpose And Joy.">

    <!-- Default OG -->
    <meta property="og:title" content="PurposeJoy Listen">
    <meta property="og:description" content="Stream gospel and faith music — Live With Purpose And Joy.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://purposejoy.org/listen">
    <meta property="og:image" content="https://purposejoy.org/icons/icon-512.png">
    <meta name="twitter:card" content="summary_large_image">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.webmanifest">
    <meta name="theme-color" content="#1A0C00">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="PurposeJoy">
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">

    <!-- iOS PWA splash images -->
    <link rel="apple-touch-startup-image"
          media="(device-width: 375px) and (device-height: 667px) and (-webkit-device-pixel-ratio: 2)"
          href="/splash/apple-touch-startup-iphone-8.png">
    <link rel="apple-touch-startup-image"
          media="(device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)"
          href="/splash/apple-touch-startup-iphone-13.png">
    <link rel="apple-touch-startup-image"
          media="(device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)"
          href="/splash/apple-touch-startup-iphone-15-pro-max.png">

    <!-- Brand typography — Montserrat (UI/headings) + Open Sans (body) + Cormorant Garamond (accent) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&family=Open+Sans:wght@300;400;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
